name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release-please:
    runs-on: homelab-agentkit-linux-general
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release-please.outputs.releases_created }}

    steps:
      - name: Create release PR or GitHub Release
        id: release-please
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-npm:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    # npm provenance requires a GitHub-hosted runner (self-hosted is rejected with E422);
    # also keeps NPM_TOKEN off the homelab runners. Free for public repos.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Print tool versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Smoke test
        run: npm run smoke --if-present

      - name: Dry-run package
        run: npm pack --dry-run --json > pack.json

      - name: Verify package contents
        run: |
          node -e "const fs=require('node:fs'); const pack=JSON.parse(fs.readFileSync('pack.json','utf8'))[0]; const files=new Set(pack.files.map((file)=>file.path)); const hasDist=[...files].some((file)=>file.startsWith('dist/')); const required=['dist/index.js','dist/index.d.ts','README.md','LICENSE']; const missing=required.filter((file)=>!files.has(file)); if (!hasDist) missing.push('dist/'); if (missing.length) { console.error('Missing required package files: '+missing.join(', ')); process.exit(1); } console.log('Package: '+pack.name); console.log('Version: '+pack.version); console.log('Publish source: Release Please');"

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
