name: Publish npm Package

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Smoke test
        run: npm run smoke

      - name: Pack package
        run: npm pack --json > pack.json

      - name: Verify package contents
        run: |
          node -e "const fs=require('node:fs'); const pack=JSON.parse(fs.readFileSync('pack.json','utf8'))[0]; const files=new Set(pack.files.map((file)=>file.path)); const required=['dist/index.js','dist/index.d.ts','dist/cli/index.js','README.md','LICENSE','CLI.md','SPEC.md']; const missing=required.filter((file)=>!files.has(file)); if (missing.length) { console.error('Missing required package files: '+missing.join(', ')); process.exit(1); } console.log('Verified package contents for '+pack.filename);"

      - name: Publish to npm
        run: npm publish --access public
